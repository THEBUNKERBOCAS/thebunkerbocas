<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Bunker | Hostal & Restaurante</title>
    
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* --- PALETA DE COLORES Y VARIABLES --- */
        :root {
            --color-principal: #1a1a1a;
            --color-secundario: #c5a880;
            --color-fondo: #f4f4f4;
            --color-texto-oscuro: #333333;
            --color-texto-claro: #ffffff;
        }

        /* --- CONFIGURACIÓN GENERAL --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--color-fondo);
            color: var(--color-texto-oscuro);
            line-height: 1.6;
            padding-top: 70px;
            overflow-x: hidden;
        }

        /* --- CABECERA Y NAVEGACIÓN --- */
        header {
            background-color: var(--color-principal);
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--color-secundario);
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem;
        }

        .logo {
            color: var(--color-texto-claro);
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .logo span {
            color: var(--color-secundario);
        }

        .nav-menu {
            display: flex;
            list-style: none;
            align-items: center;
            gap: 10px;
        }

        .nav-menu li a {
            color: var(--color-texto-claro);
            text-decoration: none;
            padding: 0.5rem 1rem;
            transition: color 0.3s;
            font-weight: 500;
        }

        .nav-menu li a:hover, .admin-btn:hover {
            color: var(--color-secundario);
        }

        .admin-btn {
            background: none;
            border: 1px solid var(--color-secundario);
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
        }

        /* --- SECCIÓN HERO (PORTADA) --- */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), #1a1a1a;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--color-texto-claro);
            padding: 0 1rem;
        }

        .hero h1 {
            font-size: 3.5rem;
            text-transform: uppercase;
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }

        .hero p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            max-width: 600px;
        }

        /* --- BOTONES --- */
        .btn {
            background-color: var(--color-secundario);
            color: var(--color-principal);
            padding: 0.8rem 2rem;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 4px;
            display: inline-block;
            margin: 5px;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn-wsp { background-color: #25D366; color: white; }
        .btn-gps { background-color: #4285F4; color: white; }
        .btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        /* --- SECCIONES --- */
        section {
            padding: 5rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 3rem;
            text-transform: uppercase;
        }

        /* --- MENÚ RESTAURANTE --- */
        .menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .menu-item {
            background-color: #ffffff;
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 4px solid var(--color-secundario);
            position: relative;
        }

        .menu-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        .price {
            color: var(--color-secundario);
            background-color: var(--color-principal);
            padding: 2px 8px;
            border-radius: 4px;
        }

        /* --- CONTENEDORES DE ANCHO COMPLETO --- */
        .hostal-wrapper {
            background-color: #eaeaea;
            width: 100%;
        }

        .hostal-info {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            align-items: center;
        }

        .hostal-img {
            flex: 1;
            min-width: 300px;
            position: relative;
        }

        .hostal-img img {
            width: 100%;
            border-radius: 8px;
            object-fit: cover;
            height: 350px;
            display: block;
        }

        .hostal-text {
            flex: 1;
            min-width: 300px;
        }

        .contacto-wrapper {
            background-color: var(--color-principal);
            color: var(--color-texto-claro);
            width: 100%;
        }

        .contacto-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
        }

        .info-box h3 {
            color: var(--color-secundario);
            margin-bottom: 1rem;
        }

        /* --- FOOTER --- */
        footer {
            background-color: #0f0f0f;
            color: #777;
            text-align: center;
            padding: 1.5rem;
            font-size: 0.9rem;
        }

        /* --- INTERFAZ ADMINISTRADOR --- */
        .admin-controls {
            display: none;
            background: #fff3cd;
            padding: 12px;
            position: fixed;
            bottom: 0;
            width: 100%;
            left: 0;
            z-index: 2000;
            text-align: center;
            border-top: 3px solid #ffc107;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.1);
        }

        .editable {
            border: 1px dashed transparent;
            padding: 2px;
            outline: none;
        }

        body.admin-mode .editable {
            border: 1px dashed #ffc107;
            background-color: rgba(255, 193, 7, 0.1);
        }

        body.admin-mode .edit-img-btn, 
        body.admin-mode .delete-item-btn {
            display: block !important;
        }

        .edit-img-btn {
            display: none;
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ffc107;
            border: none;
            padding: 8px 12px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            z-index: 10;
            color: #000;
        }

        .delete-item-btn {
            display: none;
            position: absolute;
            top: -10px;
            right: -10px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            cursor: pointer;
            font-weight: bold;
            line-height: 1;
        }
    </style>
</head>
<body>

    <!-- NAVEGACIÓN -->
    <header>
        <div class="navbar">
            <div class="logo">The <span>Bunker</span></div>
            <ul class="nav-menu">
                <li><a href="#restaurante">Menú</a></li>
                <li><a href="#hostal">Hostal</a></li>
                <li><a href="#contacto">Contacto</a></li>
                <li><button class="admin-btn" id="toggleAdminBtn">Modo Admin</button></li>
            </ul>
        </div>
    </header>

    <!-- PORTADA -->
    <section class="hero" id="inicio">
        <h1 class="editable" id="hero-title">The Bunker</h1>
        <p class="editable" id="hero-desc">Hostal seguro y la mejor comida casera de la zona.</p>
        <div>
            <a href="#" class="btn btn-wsp" id="hero-wsp">WhatsApp</a>
            <a href="#" class="btn btn-gps" id="hero-gps">Cómo llegar</a>
        </div>
    </section>

    <!-- RESTAURANTE -->
    <section id="restaurante">
        <h2 class="section-title">Nuestro Menú</h2>
        <div style="text-align: center; margin-bottom: 2rem;">
            <button class="btn" id="add-menu-item" style="display: none; background: #28a745; color: white;">+ Agregar Platillo</button>
        </div>
        <div class="menu-container" id="menu-items-container">
            <!-- Los elementos se cargan dinámicamente aquí -->
        </div>
    </section>

    <!-- HOSTAL -->
    <div class="hostal-wrapper" id="hostal">
        <section>
            <h2 class="section-title">El Hostal</h2>
            <div class="hostal-info">
                <div class="hostal-img">
                    <button class="edit-img-btn" onclick="cambiarImagen('hostal-img-element')">Cambiar Foto</button>
